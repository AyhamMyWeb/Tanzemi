<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - SheOut</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .admin-nav-btn {
            padding: 12px 24px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            color: var(--text);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .admin-nav-btn.active,
        .admin-nav-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .admin-section {
            display: none;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }
        
        .admin-section.active {
            display: block;
        }
        
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .admin-card {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        
        .admin-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text);
            font-size: 14px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            background: var(--secondary);
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }
        
        .btn-edit {
            background: #3498db;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .report-card {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary);
        }
        
        .report-category {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .category-help { background: #3498db; color: white; }
        .category-bug { background: #e74c3c; color: white; }
        .category-ask { background: #f39c12; color: white; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        
        th {
            background: var(--bg-color);
            font-weight: bold;
        }
        
        .image-upload {
            border: 2px dashed var(--border-color);
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        .image-upload:hover {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div>
                <h1>🛍️ لوحة تحكم SheOut</h1>
                <p>إدارة المنتجات، الطلبات، والبلاغات</p>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="adminUsername"></span>
                <button onclick="logout()" class="btn-danger">تسجيل خروج</button>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalProducts">0</div>
                <div class="stat-label">إجمالي المنتجات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">إجمالي الطلبات</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalReports">0</div>
                <div class="stat-label">البلاغات المعلقة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">عدد المستخدمين</div>
            </div>
        </div>
        
        <!-- Navigation -->
        <div class="admin-nav">
            <button class="admin-nav-btn active" onclick="showSection('products')">📦 المنتجات</button>
            <button class="admin-nav-btn" onclick="showSection('reports')">📋 البلاغات</button>
            <button class="admin-nav-btn" onclick="showSection('news')">📢 شريط الأخبار</button>
            <button class="admin-nav-btn" onclick="showSection('orders')">🛒 الطلبات</button>
        </div>
        
        <!-- Products Section -->
        <div id="products-section" class="admin-section active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>إدارة المنتجات</h2>
                <button class="btn-primary" onclick="openProductModal()">+ إضافة منتج جديد</button>
            </div>
            <div id="productsGrid" class="admin-grid"></div>
        </div>
        
        <!-- Reports Section -->
        <div id="reports-section" class="admin-section">
            <h2>بلاغات الدعم الفني</h2>
            <div id="reportsList" style="margin-top: 20px;"></div>
        </div>
        
        <!-- News Section -->
        <div id="news-section" class="admin-section">
            <h2>إدارة شريط الأخبار</h2>
            <div class="form-group" style="margin-top: 20px;">
                <label>نص الإشعار:</label>
                <textarea id="newsMessage" rows="4" placeholder="أدخل نص الإشعار هنا..."></textarea>
            </div>
            <button class="btn-primary" onclick="saveNews()">حفظ التغييرات</button>
            
            <h3 style="margin-top: 40px;">الأخبار الحالية</h3>
            <div id="newsList" style="margin-top: 20px;"></div>
        </div>
        
        <!-- Orders Section -->
        <div id="orders-section" class="admin-section">
            <h2>إدارة الطلبات</h2>
            <div id="ordersList" style="margin-top: 20px;">
                <table>
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>المستخدم</th>
                            <th>التاريخ</th>
                            <th>المبلغ</th>
                            <th>التفاصيل</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">إضافة منتج جديد</h2>
                <button class="close-modal" onclick="closeProductModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>اسم المنتج *</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>وصف المنتج *</label>
                    <textarea id="productDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>السعر *</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>صورة المنتج (URL)</label>
                    <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                </div>
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn-danger" onclick="closeProductModal()">إلغاء</button>
                    <button type="submit" class="btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
